name: Snyk SCA scan
description: >
  Open source dependency scan (snyk test). Install your dependencies before calling this.

inputs:
  snyk-token:
    description: Snyk API token. Set it as a repo or org secret.
    required: true
  snyk-org:
    description: Snyk org slug or UUID. Only needed if your token spans orgs.
    default: ""
  monitor:
    description: >
      "true" publishes results to the Snyk Web UI so the platform tracks this
      project over time (trending, notifications on newly disclosed vulns,
      UI-managed ignores). Enable on default-branch pushes only, or every PR
      branch becomes a Snyk project.
    default: "false"
  target-reference:
    description: Branch or version grouping for published snapshots, e.g. main.
    default: ""
  severity-threshold:
    description: "low | medium | high | critical. Findings below this are ignored."
    default: high
  fail-on-findings:
    description: >
      "true" fails this check when findings exist. Leave "false" and let the
      code scanning check do the blocking instead, or you gate twice.
    default: "false"
  upload-sarif:
    description: >
      "true" sends results to GitHub code scanning: PR diff annotations, new
      vs existing alert detection, and the alerts UI. Free on public repos;
      private repos need GitHub Code Security.
    default: "true"
  pr-comment:
    description: '"true" posts/updates one sticky comment on the PR.'
    default: "true"
  working-directory:
    description: Directory to scan. For monorepos.
    default: "."
  install-command:
    description: >
      Command run before the scan; `snyk test` scans RESOLVED dependencies,
      so they must be installed first. "auto" detects the ecosystem
      (npm/yarn/pnpm, pip/poetry/pipenv, Go, JVM) and installs with
      script-execution disabled where supported. "skip" runs nothing.
      Anything else runs verbatim in bash. It comes from the workflow
      author's file, so never build it from untrusted input.
    default: auto
  extra-args:
    description: Extra Snyk CLI flags, appended verbatim.
    default: ""
  comment-marker:
    description: >
      Identifies this scan's sticky comment and its code scanning category.
      Only change it if you call this action twice in one repo.
    default: snyk-sca
  snyk-cli-version:
    description: '"latest", or a version like "1.1306.1" to pin.'
    default: latest
  github-token:
    description: Token used to read the PR and write the comment.
    default: ${{ github.token }}

outputs:
  exit-code:
    description: "Snyk CLI exit code: 0 clean, 1 findings, 2 error, 3 nothing to scan."
    value: ${{ steps.scan.outputs.code }}
  results-file:
    description: SARIF path, relative to working-directory.
    value: snyk-sca.sarif

runs:
  using: composite
  steps:
    - name: Check token
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: |
        if [ -z "$SNYK_TOKEN" ]; then
          echo "::error::snyk-token is empty. Set the SNYK_TOKEN secret on this repo or org."
          exit 1
        fi

    - name: Install Snyk CLI
      shell: bash
      env:
        SNYK_VERSION: ${{ inputs.snyk-cli-version }}
      run: bash "${{ github.action_path }}/../scripts/install-snyk.sh"

    # snyk test scans resolved dependencies; resolve them first.
    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INSTALL_COMMAND: ${{ inputs.install-command }}
      run: bash "${{ github.action_path }}/../scripts/install-deps.sh"

    # Exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan.
    - name: SCA scan
      id: scan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
        SNYK_CFG_ORG: ${{ inputs.snyk-org }}
        SEVERITY: ${{ inputs.severity-threshold }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set +e
        # Output is teed so failures can be diagnosed. PIPESTATUS keeps the
        # real exit code. EXTRA_ARGS is unquoted: it is a flag list.
        # The snyk command stays on ONE line via an args array. A doubled
        # backslash continuation here previously became a literal backslash
        # argument: Snyk scanned a path of one backslash, reported zero
        # findings, and the second line exited 127 as its own command.
        args=(--severity-threshold="$SEVERITY" --sarif-file-output="snyk-sca.sarif" --json-file-output="snyk-sca.json")
        snyk test "${args[@]}" $EXTRA_ARGS 2>&1 | tee snyk-sca.log
        echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Monitor
      if: inputs.monitor == 'true' && steps.scan.outputs.code == '0' || inputs.monitor == 'true' && steps.scan.outputs.code == '1'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
        SNYK_CFG_ORG: ${{ inputs.snyk-org }}
        TARGET_REF: ${{ inputs.target-reference }}
        REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        args=(--remote-repo-url="$REPO_URL")
        [ -n "$TARGET_REF" ] && args+=(--target-reference="$TARGET_REF")
        snyk monitor "${args[@]}" $EXTRA_ARGS

    - name: Diagnose
      id: diag
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLASSIFY_LOG: snyk-sca.log
        CLASSIFY_EXIT: ${{ steps.scan.outputs.code }}
        CLASSIFY_SCAN: SCA
      run: python3 "${{ github.action_path }}/../scripts/classify.py"

    - name: Report
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        TITLE: Snyk SCA (${{ inputs.severity-threshold }}+)
        FILE: snyk-sca.sarif
        EXIT_CODE: ${{ steps.scan.outputs.code }}
        MARKER: ${{ inputs.comment-marker }}
        PR_COMMENT: ${{ inputs.pr-comment }}
        ERROR_MESSAGE: ${{ steps.diag.outputs.message }}
        ERROR_HINT: ${{ steps.diag.outputs.hint }}
      run: bash "${{ github.action_path }}/../scripts/report.sh"

    # No SARIF on clean scan
    - name: Upload to code scanning
      if: always() && inputs.upload-sarif == 'true'
      shell: bash
      id: sarif
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -s "snyk-sca.sarif" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"
        else echo "ok=false" >> "$GITHUB_OUTPUT"; echo "::notice::No SARIF produced; nothing to upload."; fi

    - name: Upload SARIF
      if: always() && inputs.upload-sarif == 'true' && steps.sarif.outputs.ok == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.working-directory }}/snyk-sca.sarif
        # Must be unique per scan: code scanning allows one upload per category.
        category: ${{ inputs.comment-marker }}
        checkout_path: ${{ github.workspace }}/${{ inputs.working-directory }}
        token: ${{ inputs.github-token }}

    - name: Gate
      if: always()
      shell: bash
      env:
        CODE: ${{ steps.scan.outputs.code }}
        MESSAGE: ${{ steps.diag.outputs.message }}
        HINT: ${{ steps.diag.outputs.hint }}
        FAIL_ON: ${{ inputs.fail-on-findings }}
        SEVERITY: ${{ inputs.severity-threshold }}
      run: |
        case "${CODE:-none}" in
          0)
            echo "SCA: clean." ;;
          3)
            echo "SCA: nothing to scan." ;;
          1)
            if [ "$FAIL_ON" = "true" ]; then
              echo "::error::SCA: findings at ${SEVERITY}+ severity."; exit 1
            fi
            echo "SCA: findings reported, not gated here." ;;
          *)
            echo "::error::${MESSAGE:-SCA: scan failed (exit ${CODE:-unknown}).} ${HINT}"
            exit 1 ;;
        esac
