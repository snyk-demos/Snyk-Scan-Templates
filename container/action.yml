name: Snyk Container scan
description: >
  Scan an already-built image (snyk container test). Build the image first. This is the one scan the Snyk SCM integration cannot do, because the image never exists in Git.

inputs:
  image:
    description: Image to scan, e.g. local/app:sha. Build it before calling this.
    required: true
  dockerfile:
    description: Dockerfile path, for base image upgrade advice. Skipped if absent.
    default: Dockerfile
  exclude-app-vulns:
    description: '"true" scans OS packages only, so app deps are not double-counted against SCA.'
    default: "true"
  monitor:
    description: '"true" snapshots the image to Snyk for ongoing tracking. Default branch only.'
    default: "false"
  monitor-required:
    description: >
      "true" fails the job when the Snyk snapshot cannot be published. 
      Default "false": the scan and its SARIF are what gate the branch, so a failed
      upload is a loud warning rather than a red security check. Snyk documents
      container monitor exit 2 as retryable, and the action retries 3 times
      before reporting.
    default: "false"
  project-name:
    description: >
      Stable Snyk project name for monitor. Empty defaults to
      "<org>/<repo>/<image-without-tag>". Keep it sha-free and registry-free
      or every push creates a new project and snapshot history fragments.
    default: ""
  target-reference:
    description: Branch or version grouping for monitor snapshots.
    default: ""
  snyk-token:
    description: Snyk API token. Set it as a repo or org secret.
    required: true
  snyk-org:
    description: Snyk org slug or UUID. Only needed if your token spans orgs.
    default: ""
  severity-threshold:
    description: "low | medium | high | critical. Findings below this are ignored."
    default: high
  fail-on-findings:
    description: >
      "true" fails this check when findings exist. Leave "false" and let the
      code scanning check do the blocking instead, or you gate twice.
    default: "false"
  upload-sarif:
    description: >
      "true" sends results to GitHub code scanning: PR diff annotations, new
      vs existing alert detection, and the alerts UI. Free on public repos;
      private repos need GitHub Code Security.
    default: "true"
  pr-comment:
    description: '"true" posts/updates one sticky comment on the PR.'
    default: "true"
  working-directory:
    description: Directory to scan. For monorepos.
    default: "."
  extra-args:
    description: Extra Snyk CLI flags, appended verbatim.
    default: ""
  comment-marker:
    description: >
      Identifies this scan's sticky comment and its code scanning category.
      Only change it if you call this action twice in one repo.
    default: snyk-container
  snyk-cli-version:
    description: '"latest", or a version like "1.1306.1" to pin.'
    default: latest
  github-token:
    description: Token used to read the PR and write the comment.
    default: ${{ github.token }}

outputs:
  exit-code:
    description: "Snyk CLI exit code: 0 clean, 1 findings, 2 error, 3 nothing to scan."
    value: ${{ steps.scan.outputs.code }}
  results-file:
    description: SARIF path, relative to working-directory.
    value: snyk-container.sarif

runs:
  using: composite
  steps:
    - name: Check token
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: |
        if [ -z "$SNYK_TOKEN" ]; then
          echo "::error::snyk-token is empty. Set the SNYK_TOKEN secret on this repo or org."
          exit 1
        fi

    - name: Install Snyk CLI
      shell: bash
      env:
        SNYK_VERSION: ${{ inputs.snyk-cli-version }}
      run: bash "${{ github.action_path }}/../scripts/install-snyk.sh"

    # Exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan.
    - name: Resolve names
      id: names
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        PROJECT_NAME: ${{ inputs.project-name }}
        GH_REPO: ${{ github.repository }}
        SEVERITY: ${{ inputs.severity-threshold }}
      run: |
        repo_lc=$(printf '%s' "$GH_REPO" | tr '[:upper:]' '[:lower:]')
        img="${IMAGE%%:*}"                 # image without tag
        tag="${IMAGE#"$img"}"; tag="${tag#:}"
        # Prefix with the repo only when the image is not already repo-named.
        case "$img" in
          "$repo_lc"|"$repo_lc"/*) qualified="$img" ;;
          *)                       qualified="${repo_lc}/${img}" ;;
        esac
        # Project name drops the tag.
        [ -n "$PROJECT_NAME" ] || PROJECT_NAME="$qualified"
        echo "project=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
        # Title keeps the tag so the report says exactly what was scanned.
        short="$tag"
        case "$tag" in
          [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]*) short="${tag:0:7}" ;;
        esac
        [ -n "$short" ] && qualified="${qualified}:${short}"
        echo "title=${qualified} (${SEVERITY}+)" >> "$GITHUB_OUTPUT"

    - name: Container scan
      id: scan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
        SNYK_CFG_ORG: ${{ inputs.snyk-org }}
        SEVERITY: ${{ inputs.severity-threshold }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
        IMAGE: ${{ inputs.image }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        EXCLUDE_APP_VULNS: ${{ inputs.exclude-app-vulns }}
      run: |
        set +e
        args=()
        if [ -n "$DOCKERFILE" ] && [ -f "$DOCKERFILE" ]; then
          args+=(--file="$DOCKERFILE")
        else
          echo "::warning::Dockerfile '$DOCKERFILE' not found; no base image upgrade advice."
        fi
        [ "$EXCLUDE_APP_VULNS" = "true" ] && args+=(--exclude-app-vulns)
        snyk container test "$IMAGE" "${args[@]}" --severity-threshold="$SEVERITY" --sarif-file-output=snyk-container.sarif --json-file-output=snyk-container.json $EXTRA_ARGS 2>&1 | tee snyk-container.log
        echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        exit 0

    # Turns a failure into a cause and a fix. Also warns about a Snyk quota
    # wall even when this scan passed, since it is why the next one will not.
    - name: Diagnose
      id: diag
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLASSIFY_LOG: snyk-container.log
        CLASSIFY_EXIT: ${{ steps.scan.outputs.code }}
        CLASSIFY_SCAN: Container
      run: python3 "${{ github.action_path }}/../scripts/classify.py"

    - name: Report
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        TITLE: ${{ steps.names.outputs.title }}
        FILE: snyk-container.sarif
        EXIT_CODE: ${{ steps.scan.outputs.code }}
        MARKER: ${{ inputs.comment-marker }}
        PR_COMMENT: ${{ inputs.pr-comment }}
        REASON: ${{ steps.diag.outputs.reason }}
        ERROR_MESSAGE: ${{ steps.diag.outputs.message }}
        ERROR_HINT: ${{ steps.diag.outputs.hint }}
      run: bash "${{ github.action_path }}/../scripts/report.sh"

    - name: Monitor
      if: inputs.monitor == 'true' && steps.scan.outputs.code == '0' || inputs.monitor == 'true' && steps.scan.outputs.code == '1'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
        SNYK_CFG_ORG: ${{ inputs.snyk-org }}
        IMAGE: ${{ inputs.image }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        EXCLUDE_APP_VULNS: ${{ inputs.exclude-app-vulns }}
        PROJECT_NAME: ${{ steps.names.outputs.project }}
        TARGET_REF: ${{ inputs.target-reference }}
        MONITOR_REQUIRED: ${{ inputs.monitor-required }}
      run: |
        set +e
        args=()
        [ -n "$DOCKERFILE" ] && [ -f "$DOCKERFILE" ] && args+=(--file="$DOCKERFILE")
        [ "$EXCLUDE_APP_VULNS" = "true" ] && args+=(--exclude-app-vulns)
        [ -n "$TARGET_REF" ] && args+=(--target-reference="$TARGET_REF")
        
        code=0
        for attempt in 1 2 3; do
          snyk container monitor "$IMAGE" "${args[@]}" --project-name="$PROJECT_NAME"
          code=$?
          [ "$code" = "0" ] && break
          if [ "$attempt" -lt 3 ]; then
            echo "::warning::Snapshot upload failed (exit ${code}); retrying in $((attempt * 30))s."
            sleep $((attempt * 30))
          fi
        done

        if [ "$code" = "0" ]; then
          echo "Snapshot published to Snyk as '${PROJECT_NAME}'."
          exit 0
        fi
        
        msg="Container: could not publish the snapshot to Snyk (exit ${code}) after 3 attempts. \
        The scan and its SARIF are unaffected; the Snyk UI project '${PROJECT_NAME}' keeps its previous state. \
        Re-run the job, or run with extra-args: \"-d\" to capture debug output."
        if [ "$MONITOR_REQUIRED" = "true" ]; then
          echo "::error::${msg}"; exit 1
        fi
        echo "::warning::${msg}"

    # No SARIF on clean scans
    - name: Check SARIF
      if: always() && inputs.upload-sarif == 'true'
      shell: bash
      id: sarif
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -s "snyk-container.sarif" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"
        else echo "ok=false" >> "$GITHUB_OUTPUT"; echo "::notice::No SARIF produced; nothing to upload."; fi

    - name: Upload SARIF
      if: always() && inputs.upload-sarif == 'true' && steps.sarif.outputs.ok == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.working-directory }}/snyk-container.sarif
        # Must be unique, code scanning allows one upload per category.
        category: ${{ inputs.comment-marker }}
        checkout_path: ${{ github.workspace }}/${{ inputs.working-directory }}
        token: ${{ inputs.github-token }}

    # Only 0, 1 and 3 are known-good outcomes. ANY other code fails.
    - name: Gate
      if: always()
      shell: bash
      env:
        CODE: ${{ steps.scan.outputs.code }}
        REASON: ${{ steps.diag.outputs.reason }}
        MESSAGE: ${{ steps.diag.outputs.message }}
        HINT: ${{ steps.diag.outputs.hint }}
        FAIL_ON: ${{ inputs.fail-on-findings }}
        SEVERITY: ${{ inputs.severity-threshold }}
      run: |
        case "${CODE:-none}" in
          0)
            echo "Container: clean." ;;
          3)
            echo "Container: nothing to scan." ;;
          1)
            if [ "$FAIL_ON" = "true" ]; then
              echo "::error::Container: findings at ${SEVERITY}+ severity."; exit 1
            fi
            echo "Container: findings reported, not gated here." ;;
          *)
            if [ "$REASON" = "nothing-to-scan" ]; then
              echo "Container: nothing to scan."; exit 0
            fi
            echo "::error::${MESSAGE:-Container: scan failed (exit ${CODE:-unknown}).} ${HINT}"
            exit 1 ;;
        esac
